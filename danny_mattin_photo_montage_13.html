<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danny Mattin — Life on the Road</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #07060b;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }

  /* === HEAVY METAL FRAME === */
  .montage-frame {
    position: relative;
    width: 90vw;
    max-width: 750px;
    height: 70vh;
    max-height: 500px;
    background: #0a0a0f;
    overflow: hidden;

    /* Thick steel/chrome border */
    border: 8px solid #3a3a3a;
    border-image: linear-gradient(
      145deg,
      #1a1a1a 0%,
      #555 12%,
      #2a2a2a 25%,
      #666 38%,
      #1a1a1a 50%,
      #555 62%,
      #2a2a2a 75%,
      #666 88%,
      #1a1a1a 100%
    ) 1;

    /* Industrial glow — dark red/orange heat + steel shadow */
    box-shadow:
      0 0 4px rgba(180, 40, 20, 0.6),
      0 0 20px rgba(180, 40, 20, 0.2),
      0 0 50px rgba(0, 0, 0, 0.8),
      inset 0 0 40px rgba(0, 0, 0, 0.7),
      inset 0 0 4px rgba(180, 40, 20, 0.15);
  }

  /* Corner rivets */
  .montage-frame::before,
  .montage-frame::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #777, #333 50%, #1a1a1a);
    box-shadow: 0 0 4px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.15);
    z-index: 5;
  }
  .montage-frame::before { top: 10px; left: 10px; }
  .montage-frame::after { top: 10px; right: 10px; }

  /* Bottom corner rivets via the montage inner wrapper */
  #montage-inner::before,
  #montage-inner::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #777, #333 50%, #1a1a1a);
    box-shadow: 0 0 4px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.15);
    z-index: 5;
  }
  #montage-inner::before { bottom: 10px; left: 10px; }
  #montage-inner::after { bottom: 10px; right: 10px; }
  #montage-inner { position: absolute; inset: 0; }

  /* Images — NO inner border/frame */
  .montage-frame img {
    position: absolute;
    top: 50%;
    left: 50%;
    max-width: 85%;
    max-height: 85%;
    object-fit: contain;
    opacity: 0;
    transform: translate(-50%, -50%) rotate(0deg);
    transition: opacity 0.12s ease;
    box-shadow: 6px 6px 30px rgba(0, 0, 0, 0.8);
  }

  .montage-frame img.active {
    opacity: 1;
  }

  .controls {
    position: fixed;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    align-items: center;
    z-index: 10;
  }

  .controls button {
    background: rgba(100, 100, 100, 0.25);
    border: 1px solid rgba(150, 150, 150, 0.3);
    color: #999;
    padding: 6px 16px;
    cursor: pointer;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.3s;
  }

  .controls button:hover {
    background: rgba(180, 40, 20, 0.25);
    border-color: rgba(180, 40, 20, 0.5);
    color: #ccc;
  }

  .controls button.active-btn {
    background: rgba(180, 40, 20, 0.6);
    border-color: rgba(180, 40, 20, 0.8);
    color: #fff;
  }

  .controls span {
    color: #777;
    font-size: 0.8rem;
  }

  /* Mobile */
  @media (max-width: 600px) {
    .montage-frame {
      width: 95vw;
      height: 55vh;
      border-width: 6px;
    }
    .montage-frame::before, .montage-frame::after,
    #montage-inner::before, #montage-inner::after {
      width: 10px; height: 10px;
    }
  }
</style>
</head>
<body>

<div class="montage-frame" id="montage">
  <div id="montage-inner"></div>
  <img src="images/lifeontheroad/AUSTRALIAN%20TOUR.jpeg" alt="Australian Tour">
  <img src="images/lifeontheroad/Australia%20tour.jpg" alt="Australia tour">
  <img src="images/lifeontheroad/DRESSED%20FOR%20ACTION.jpeg" alt="Dressed for action">
  <img src="images/lifeontheroad/DandP.jpg" alt="Danny and P">
  <img src="images/lifeontheroad/THE%20ULTIMATE%20PLEASERS.jpeg" alt="The Ultimate Pleasers">
  <img src="images/lifeontheroad/danny%204.jpg" alt="Danny 4">
  <img src="images/lifeontheroad/danny%20and%20pandy.jpg" alt="Danny and Pandy">
  <img src="images/lifeontheroad/danny2.jpg" alt="Danny 2">
  <img src="images/lifeontheroad/festival.jpg" alt="Festival">
  <img src="images/lifeontheroad/mark%20olbrich%20blues%20enternity%20poster.jpg" alt="Mark Olbrich Blues Eternity poster">
  <img src="images/lifeontheroad/mark%20olbrich%20blues%20eternity%20band%20on%20the%20road.jpg" alt="Blues Eternity band on the road">
  <img src="images/lifeontheroad/mark%20olbrich%20blues%20eternity%20group%20on%20the%20road.jpg" alt="Blues Eternity group on the road">
  <img src="images/lifeontheroad/metal%20waistcoat%20for%20style%20section.jpg" alt="Metal waistcoat">
  <img src="images/lifeontheroad/on%20the%20rd.jpg" alt="On the road">
  <img src="images/lifeontheroad/onrd.jpg" alt="On the road 2">
 <img src="images/lifeontheroad/onroadagain.jpg" alt="On the road again">
<img src="images/lifeontheroad/onroadgitrap.jpg" alt="On the road gig">
<img src="images/lifeontheroad/ontheroad.jpg" alt="On the road">
<img src="images/lifeontheroad/ontheroadbane.jpg" alt="On the road bane">
<img src="images/lifeontheroad/onthwroad.jpg" alt="On the road">
<img src="images/lifeontheroad/ozzy%20poster.jpg" alt="Ozzy poster">
<img src="images/lifeontheroad/poster.jpg" alt="Poster">
<img src="images/lifeontheroad/rig%20on%20road.jpg" alt="Rig on road">
<img src="images/lifeontheroad/rig.jpg" alt="Rig">
<img src="images/lifeontheroad/rig3.jpg" alt="Rig setup">
<img src="images/lifeontheroad/rising%20bob%20Richards.jpg" alt="Rising Bob Richards">
<img src="images/lifeontheroad/rock%20style.jpg" alt="Rock style">
<img src="images/lifeontheroad/rock%20style2.jpg" alt="Rock style 2">
<img src="images/lifeontheroad/vs.jpg" alt="VS">
<img src="images/lifeontheroad/waistcoat.jpg" alt="Waistcoat">
</div>

<div class="controls">
  <button id="playBtn" class="active-btn" onclick="togglePlay()">⏸ PAUSE</button>
  <span>Speed:</span>
  <button onclick="setSpeed(800)">Slow</button>
  <button onclick="setSpeed(350)" class="active-btn">Fast</button>
  <button onclick="setSpeed(120)">Rapid</button>
</div>

<script>
  const imgs = document.querySelectorAll('#montage img');
  const angles = [-4, 3, -2, 5, -3, 2, -5, 4, -1, 3, -4, 2, -3, 5, -2];
  let current = 0;
  let speed = 350;
  let playing = true;
  let timer;

  imgs.forEach((img, i) => {
    img.style.transform = `translate(-50%, -50%) rotate(${angles[i % angles.length]}deg)`;
  });

  function showNext() {
    imgs[current].classList.remove('active');
    current = (current + 1) % imgs.length;
    imgs[current].classList.add('active');
  }

  function startCycle() {
    clearInterval(timer);
    timer = setInterval(showNext, speed);
  }

  function togglePlay() {
    const btn = document.getElementById('playBtn');
    if (playing) {
      clearInterval(timer);
      btn.textContent = '▶ PLAY';
      btn.classList.remove('active-btn');
    } else {
      startCycle();
      btn.textContent = '⏸ PAUSE';
      btn.classList.add('active-btn');
    }
    playing = !playing;
  }

  function setSpeed(s) {
    speed = s;
    document.querySelectorAll('.controls button').forEach(b => {
      if (b.id !== 'playBtn') b.classList.remove('active-btn');
    });
    event.target.classList.add('active-btn');
    if (playing) startCycle();
  }

  imgs[0].classList.add('active');
  startCycle();
</script>

</body>
</html>
